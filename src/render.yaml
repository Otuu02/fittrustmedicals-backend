# render.yaml
services:
  - type: web
    name: fittrustmedicals-backend
    runtime: image
    repo:  https://github.com/Otuu02/fittrustmedicals-backend
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: fittrustmedicals-db
          property: connectionString
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CORS_ORIGIN
        value: https://fittrustmedicals.com,https://www.fittrustmedicals.com
      - key: FRONTEND_URL
        value: https://fittrustmedicals.com

databases:
  - name: fittrustmedicals-db
    plan: free
    databaseName: fittrustmedicals
    user: postgres